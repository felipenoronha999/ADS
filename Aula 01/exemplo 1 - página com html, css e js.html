<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Exemplo Simples</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      background: #f0f8ff; 
      padding: 40px; 
    }
    h1   { color: navy; }
    button { 
      padding: 15px 30px; 
      font-size: 1.3em; 
      background: #4CAF50; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
    }
    #resultado { 
      font-size: 2em; 
      margin: 30px; 
      color: #d32f2f; 
    }
  </style>
</head>
<body>

  <h1>Exemplo HTML + CSS + JS</h1>
  
  <p>Clique quantas vezes quiser:</p>
  
  <button onclick="contar()">Clique aqui!</button>
  
  <div id="resultado">0</div>

  <script>
    let contador = 0;
    
    function contar() {
      contador++;
      document.getElementById("resultado").innerText = contador;
    }
  </script>

</body>
</html>
