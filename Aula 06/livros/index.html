<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards a partir de XML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 2rem;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1e2a3a;
        }
        .subtitle {
            text-align: center;
            color: #4a627a;
            margin-bottom: 2rem;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .card-content {
            padding: 1.2rem;
        }
        .disponivel {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            margin-bottom: 0.7rem;
        }
        h3 {
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        p {
            margin-bottom: 0.3rem;
            color: #334155;
        }
        .card-id {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.8rem;
            text-align: right;
            border-top: 1px solid #e2e8f0;
            padding-top: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #5b6e8c;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Catálogo de Livros (XML)</h1>
    <div class="subtitle">Dados carregados a partir de um arquivo XML com elementos e atributos</div>
    <div id="cards-container" class="cards-grid">
        <p>Carregando...</p>
    </div>
    <footer>Exemplo de acesso a atributos (id, disponivel) e elementos filhos do XML</footer>
</div>
<script src="script.js"></script>
</body>
</html>
