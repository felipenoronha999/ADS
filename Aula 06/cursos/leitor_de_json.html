<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards com JSON externo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1e2a3a;
            font-size: 2.2rem;
        }

        .subtitle {
            text-align: center;
            color: #4a627a;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            border-bottom: 2px solid #cbd5e1;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 0.5rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.12);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 3px solid #3b82f6;
        }

        .card-content {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-categoria {
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            margin-bottom: 0.7rem;
            align-self: flex-start;
        }

        .card-titulo {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }

        .card-descricao {
            color: #334155;
            line-height: 1.4;
            margin-bottom: 1rem;
            flex: 1;
        }

        .card-id {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            text-align: right;
            border-top: 1px solid #e2e8f0;
            padding-top: 0.5rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #5b6e8c;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Biblioteca de Estudos</h1>
    <div style="text-align: center;">
        <div class="subtitle">Cards gerados a partir de um arquivo JSON externo</div>
    </div>

    <div id="cards-container" class="cards-grid">
        <div style="text-align: center; grid-column: 1/-1;">⏳ Carregando cards...</div>
    </div>
    <footer>
        ⚡ Os dados são carregados do arquivo <code>dados.json</code> via Fetch API
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
