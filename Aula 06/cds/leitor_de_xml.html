<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CD Collection • Catálogo de Discos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #1e2937, #334155);
      min-height: 100vh;
    }
    .cd-card {
      transition: all 0.3s ease;
    }
    .cd-card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
    .cd-image {
      background: linear-gradient(45deg, #64748b, #334155);
      box-shadow: inset 0 0 60px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body class="text-white">
  <div class="container mx-auto px-6 py-12">
    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-6xl font-bold mb-4 flex items-center justify-center gap-4">
        <i class="fas fa-compact-disc text-yellow-400"></i>
        CD Collection
      </h1>
      <p class="text-xl text-gray-300">Clássicos dos anos 70, 80 e 90 • <span id="total-cds" class="font-semibold"></span> discos</p>
    </div>

    <!-- Filtros -->
    <div class="flex flex-wrap gap-4 justify-center mb-10">
      <div class="relative">
        <input 
          type="text" 
          id="searchInput"
          placeholder="Buscar por título ou artista..." 
          class="bg-slate-800 text-white px-6 py-3 rounded-full w-96 focus:outline-none focus:ring-2 focus:ring-yellow-400 placeholder-gray-400"
        >
        <i class="fas fa-search absolute right-6 top-3.5 text-gray-400"></i>
      </div>
      
      <select id="countryFilter" class="bg-slate-800 text-white px-6 py-3 rounded-full focus:outline-none focus:ring-2 focus:ring-yellow-400">
        <option value="">Todos os países</option>
      </select>
    </div>

    <!-- Grid de CDs -->
    <div id="cdGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
      <!-- Cards serão inseridos pelo JavaScript -->
    </div>
  </div>

  <script>
    async function loadXML() {
      try {
        const response = await fetch('cd_catalog.xml');
        if (!response.ok) throw new Error('Arquivo XML não encontrado');

        const xmlText = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        const cds = xmlDoc.getElementsByTagName("CD");

        renderCatalog(cds);
        populateCountryFilter(cds);
        setupFilters();

      } catch (error) {
        console.error(error);
        document.getElementById("cdGrid").innerHTML = `
          <div class="col-span-full text-center py-20 text-red-400">
            <i class="fas fa-exclamation-triangle text-6xl mb-4"></i>
            <p class="text-xl">Erro ao carregar o XML</p>
            <p class="mt-2 text-gray-400">Certifique-se que o arquivo <strong>cd_catalog.xml</strong> está na mesma pasta.</p>
          </div>`;
      }
    }

    function createCDCard(cd) {
      const title = cd.getElementsByTagName("TITLE")[0].textContent;
      const artist = cd.getElementsByTagName("ARTIST")[0].textContent;
      const country = cd.getElementsByTagName("COUNTRY")[0].textContent;
      const company = cd.getElementsByTagName("COMPANY")[0].textContent;
      const price = parseFloat(cd.getElementsByTagName("PRICE")[0].textContent);
      const year = cd.getElementsByTagName("YEAR")[0].textContent;

      const card = document.createElement("div");
      card.className = "cd-card bg-slate-800 rounded-3xl overflow-hidden shadow-2xl";
      card.dataset.country = country;   // ← Esta linha é importante para o filtro

      card.innerHTML = `
        <div class="h-64 cd-image flex items-center justify-center relative">
          <i class="fas fa-compact-disc text-9xl text-yellow-300/20"></i>
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/70 px-5 py-1 rounded-full text-sm font-medium">
            ${year}
          </div>
        </div>
        <div class="p-6">
          <h3 class="font-bold text-lg leading-tight mb-1">${title}</h3>
          <p class="text-yellow-400 font-medium mb-4">${artist}</p>
          
          <div class="flex justify-between text-sm text-gray-400 mb-6">
            <div class="flex items-center gap-2">
              <i class="fas fa-globe"></i>
              <span>${country}</span>
            </div>
            <div class="text-right">
              <span class="text-gray-500 text-xs">Gravadora</span><br>
              <span class="text-gray-300">${company}</span>
            </div>
          </div>

          <div class="flex justify-between items-center">
            <div class="text-3xl font-bold text-green-400">R$ ${price.toFixed(2)}</div>
            <button onclick="alert('✅ ${title} adicionado ao carrinho!')" 
                    class="bg-yellow-400 hover:bg-yellow-300 transition text-black font-semibold px-6 py-3 rounded-2xl flex items-center gap-2 text-sm">
              <i class="fas fa-cart-plus"></i> Comprar
            </button>
          </div>
        </div>
      `;

      return card;
    }

    function renderCatalog(cds) {
      const grid = document.getElementById("cdGrid");
      grid.innerHTML = "";
      document.getElementById("total-cds").textContent = `${cds.length}`;

      for (let cd of cds) {
        grid.appendChild(createCDCard(cd));
      }
    }

    function populateCountryFilter(cds) {
      const countries = new Set();
      for (let cd of cds) {
        countries.add(cd.getElementsByTagName("COUNTRY")[0].textContent);
      }

      const select = document.getElementById("countryFilter");
      countries.forEach(country => {
        const option = document.createElement("option");
        option.value = country;
        option.textContent = country;
        select.appendChild(option);
      });
    }

    function setupFilters() {
      const searchInput = document.getElementById("searchInput");
      const countryFilter = document.getElementById("countryFilter");
      const grid = document.getElementById("cdGrid");

      function applyFilters() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        const selectedCountry = countryFilter.value;

        const cards = grid.querySelectorAll(".cd-card");

        cards.forEach(card => {
          const title = card.querySelector("h3").textContent.toLowerCase();
          const artist = card.querySelector("p").textContent.toLowerCase();
          const country = card.dataset.country;

          const matchesSearch = !searchTerm || 
                               title.includes(searchTerm) || 
                               artist.includes(searchTerm);

          const matchesCountry = !selectedCountry || country === selectedCountry;

          card.style.display = (matchesSearch && matchesCountry) ? "block" : "none";
        });
      }

      searchInput.addEventListener("input", applyFilters);
      countryFilter.addEventListener("change", applyFilters);
    }

    // Iniciar
    window.onload = loadXML;
  </script>
</body>
</html>
