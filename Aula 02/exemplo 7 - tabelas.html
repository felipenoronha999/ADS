<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela Centralizada</title>
    <style>
        /* Estilo para centralizar a tabela */
        table {
            margin: 50px auto; /* 50px de espaço no topo/fundo e AUTO nas laterais */
            border-collapse: collapse;
            font-family: sans-serif;
            width: 80%; /* Largura opcional */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        /* Estilos visuais apenas para ficar bonito */
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .destaque-celula {
            background-color: #f8d7da; /* tom avermelhado*/
            color: #721c24;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Minha Tabela Centralizada</h2>

    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Monitor Gamer</td>
                <td>2</td>
                <td>R$ 1.200,00</td>
            </tr>
            <tr>
                <td>Teclado Mecânico</td>
                <td class="destaque-celula">5</td>
                <td>R$ 350,00</td>
            </tr>
            <tr>
                <td>Mouse Wireless</td>
                <td>10</td>
                <td>R$ 150,00</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
