<!doctype html>

<html lang='pt-br'>

<head>

<meta charset="UTF-8">

<style>
body {
    /* Substitua pelo caminho real da sua imagem */
    background-image: url('https://static.vecteezy.com/system/resources/thumbnails/033/351/258/small/beautiful-bright-wallpaper-nature-background-ai-generated-photo.jpg');

    /* Estica a imagem para preencher tudo sem distorcer*/
    background-size: cover;

    /* Centraliza a imagem na tela */
    background-position: center;

    /* Garante que o fundo ocupe a altura toda da janela */
    min-height: 100vh;
}
</style>
