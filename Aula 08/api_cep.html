<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta de CEP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      margin: auto;
    }
    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }
    .resultado {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h2>Consulta de CEP</h2>

  <input type="text" id="cep" placeholder="Digite o CEP (somente números)">
  <button onclick="buscarCEP()">Buscar</button>

  <div class="resultado" id="resultado"></div>

  <script>
    async function buscarCEP() {
      const cep = document.getElementById('cep').value.replace(/\D/g, '');
      const resultado = document.getElementById('resultado');

      if (cep.length !== 8) {
        resultado.innerHTML = "CEP inválido!";
        return;
      }

      try {
        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await response.json();

        if (data.erro) {
          resultado.innerHTML = "CEP não encontrado.";
          return;
        }

        resultado.innerHTML = `
          <strong>Logradouro:</strong> ${data.logradouro}<br>
          <strong>Bairro:</strong> ${data.bairro}<br>
          <strong>Cidade:</strong> ${data.localidade}<br>
          <strong>Estado:</strong> ${data.uf}
        `;
      } catch (error) {
        resultado.innerHTML = "Erro ao buscar o CEP.";
      }
    }
  </script>

</body>
</html>
