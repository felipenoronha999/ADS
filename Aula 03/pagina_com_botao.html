<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botão com Link</title>
  
  <!-- Conectando o arquivo CSS externo -->
  <link rel="stylesheet" href="estilo_botao.css">
</head>
<body>

  <h1>Exemplo de Botão de redirecionamento</h1> <br>

  <a class="botao" href="https://www.google.com" target="_blank">
    Ir para o Google
  </a>

  <br><br>

    <button class="botao" onclick="window.open('https://www.youtube.com', '_blank')">
        Assistir no YouTube
    </button>


  
</body>
</html>
