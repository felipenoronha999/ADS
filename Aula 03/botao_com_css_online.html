<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Botões de Redes Sociais</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Estilos Básicos para o Corpo da Página */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }

        /* Contêiner dos Botões */
        .container-social {
            display: flex;
            gap: 15px; /* Espaço entre os botões */
        }

        /* Estilo Geral de um Botão Social (usando tag <a>) */
        .botao-social {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none; /* Remove sublinhado */
            padding: 12px 20px;
            border-radius: 50px; /* Botão arredondado nas pontas */
            color: white; /* Cor do texto e ícone */
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease; /* Animação suave */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Efeito de passar o mouse (Hover) */
        .botao-social:hover {
            transform: translateY(-3px); /* Levanta o botão */
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Estilo para o ícone dentro do botão */
        .botao-social i {
            margin-right: 10px; /* Espaço entre ícone e texto */
            font-size: 20px; /* Ícone um pouco maior */
        }

        /* --- Cores Específicas de cada Rede (Oficiais) --- */
        .youtube { background-color: #FF0000; }
        .youtube:hover { background-color: #cc0000; }

        .instagram { background-color: #E1306C; }
        .instagram:hover { background-color: #c02157; }

        .facebook { background-color: #1877F2; }
        .facebook:hover { background-color: #145dbf; }

        .whatsapp { background-color: #25D366; }
        .whatsapp:hover { background-color: #1da851; }
    </style>
</head>
<body>

    <div class="container-social">
        <a href="http://youtube.com/" target="_blank" class="botao-social youtube">
            <i class="fa-brands fa-youtube"></i> YouTube
        </a>

        <a href="http://instagram.com/" target="_blank" class="botao-social instagram">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>

        <a href="http://facebook.com/" target="_blank" class="botao-social facebook">
            <i class="fa-brands fa-facebook-f"></i> Facebook
        </a>

        <a href="http://whatsapp.com/" target="_blank" class="botao-social whatsapp">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
    </div>

</body>
</html>
